<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneDrop</title>
    <style>
        :root {
            --bg: #0f0f10;
            --surface: #1c1c1e;
            --text: #ffffff;
            --text-dim: #a1a1a6;
            --accent: #00ff41;
            --danger: #ff453a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 380px;
            background: var(--surface);
            padding: 2.5rem 1.5rem;
            border-radius: 2rem;
            text-align: center;
        }
        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 2rem; }
        .file-list { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2rem; }
        .btn {
            display: block;
            padding: 1.1rem;
            text-decoration: none;
            background: #2c2c2e;
            color: var(--text);
            border-radius: 1rem;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .btn-exit {
            color: var(--danger);
            background: transparent;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            border: none;
        }
        .footer { margin-top: 3rem; border-top: 1px solid #2c2c2e; padding-top: 1.5rem; }
        .donate-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .donate-link:hover { color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <h1>{{TITLE}}</h1>
    <div class="file-list">{{FILE_LIST}}</div>
    <a href="/shutdown" class="btn btn-exit">{{EXIT_BTN}}</a>
    <div class="footer">
        <a href="https://www.willmanstoolbox.com/donate/" target="_blank" class="donate-link">{{DONATE_TEXT}}</a>
    </div>
</div>
</body>
</html>
